schema_version = "1.3"

[task]
name = "mindlab/depth1_currency_lookup_t12"
description = "FlowBench public task metadata. Public verifier is smoke-only."
authors = [{ name = "Mind Lab", email = "contact@mindlab.ltd" }]
keywords = ["flowbench", "tool-use", "data-orchestration", "operations"]

[metadata]
benchmark = "FlowBench"
split = "public-task-only"
category = "data-processing"
depth = 1

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 900.0

[environment]
network_mode = "no-network"
build_timeout_sec = 600.0
os = "linux"
cpus = 1
memory_mb = 2048
storage_mb = 2048
gpus = 0
